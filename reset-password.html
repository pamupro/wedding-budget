<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Reset Password — WeddingLedger</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preconnect" href="https://bqggtyguhedlyfffjkkw.supabase.co">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,200;1,9..144,300&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#faf7f2;--surface:#fff;--ink:#1a1710;--muted:#7a7060;--gold:#b8862a;--gold2:#d4a840;--gold-pale:#fdf3e0;--border:rgba(26,22,18,.1);--ok:#2a7a2a;--err:#c53030}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Instrument Sans',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:44px 38px;width:100%;max-width:420px;box-shadow:0 20px 60px rgba(26,22,18,.1)}
.logo{font-family:'Fraunces',serif;font-size:22px;font-weight:200;margin-bottom:4px}
.logo em{font-style:italic;color:var(--gold)}
h1{font-family:'Fraunces',serif;font-size:26px;font-weight:200;margin:20px 0 6px}
h1 em{font-style:italic;color:var(--gold2)}
p.sub{font-size:13px;color:var(--muted);margin-bottom:24px;line-height:1.5}
label{display:block;font-size:12px;font-weight:600;margin-bottom:6px}
input{width:100%;padding:13px;border:1.5px solid var(--border);border-radius:8px;font-family:inherit;font-size:14px;margin-bottom:16px}
input:focus{outline:none;border-color:var(--gold)}
button{width:100%;padding:13px;border:none;border-radius:8px;background:var(--ink);color:#fdf9f4;font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;transition:.2s}
button:hover:not(:disabled){background:var(--gold)}
button:disabled{opacity:.55;cursor:not-allowed}
.msg{font-size:13px;padding:11px 14px;border-radius:8px;margin-bottom:16px;display:none}
.err{background:#fff0f0;color:var(--err);border:1px solid rgba(197,48,48,.2)}
.ok{background:#f0fff4;color:var(--ok);border:1px solid rgba(42,122,42,.2)}
a.back{display:inline-block;margin-top:18px;font-size:13px;color:var(--gold);text-decoration:none;font-weight:600}
</style>
</head>
<body>
<div class="card">
  <div class="logo">Wedding<em>Ledger</em></div>
  <h1>Set a new <em>password</em></h1>
  <p class="sub" id="sub">Enter a new password for your account below.</p>

  <div class="msg err" id="err"></div>
  <div class="msg ok" id="ok"></div>

  <div id="form">
    <label for="pw1">New password</label>
    <input type="password" id="pw1" placeholder="At least 6 characters" autocomplete="new-password">
    <label for="pw2">Confirm new password</label>
    <input type="password" id="pw2" placeholder="Re-enter your password" autocomplete="new-password">
    <button id="btn" onclick="updatePassword()">Update password →</button>
  </div>

  <a href="login.html" class="back">← Back to sign in</a>
</div>

<script>
const SB  = 'https://bqggtyguhedlyfffjkkw.supabase.co';
const KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJxZ2d0eWd1aGVkbHlmZmZqa2t3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3NTA0NzYsImV4cCI6MjA4ODMyNjQ3Nn0.x3tpbzhI-W4kR7MPFexPW-MZ5Ei_bkE7Nw5Q00Tx7J4';

function show(id,m){const e=document.getElementById(id);e.textContent=m;e.style.display='block';}
function hide(id){document.getElementById(id).style.display='none';}

// Supabase puts the recovery session in the URL hash: #access_token=...&type=recovery
let recoveryToken = '';
(function grabToken(){
  const hash = location.hash ? location.hash.substring(1) : '';
  const p = new URLSearchParams(hash);
  recoveryToken = p.get('access_token') || '';
  const type = p.get('type');
  if(!recoveryToken || type !== 'recovery'){
    document.getElementById('form').style.display = 'none';
    show('err','This reset link is invalid or has expired. Please request a new one from the sign-in page.');
  }
  // clean the hash so the token isn't left in the address bar
  history.replaceState(null,'',location.pathname);
})();

async function updatePassword(){
  const pw1 = document.getElementById('pw1').value;
  const pw2 = document.getElementById('pw2').value;
  hide('err'); hide('ok');
  if(pw1.length < 6){ show('err','Password must be at least 6 characters.'); return; }
  if(pw1 !== pw2){ show('err','The two passwords don\u2019t match.'); return; }
  if(!recoveryToken){ show('err','No valid reset session. Request a new link.'); return; }

  const btn = document.getElementById('btn');
  btn.disabled = true; btn.textContent = 'Updating\u2026';
  try{
    const r = await fetch(SB + '/auth/v1/user', {
      method: 'PUT',
      headers: { 'apikey': KEY, 'Authorization': 'Bearer ' + recoveryToken, 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: pw1 })
    });
    const d = await r.json();
    if(!r.ok) throw new Error(d.msg || d.error_description || 'Could not update password');
    document.getElementById('form').style.display = 'none';
    show('ok','\u2705 Password updated! You can now sign in with your new password.');
    setTimeout(()=>{ location.href = 'login.html'; }, 2200);
  }catch(e){
    show('err', e.message);
    btn.disabled = false; btn.textContent = 'Update password \u2192';
  }
}
</script>
</body>
</html>
