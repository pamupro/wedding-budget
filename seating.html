<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
  <title>Seating — WeddingLedger</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Jost:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    *{box-sizing:border-box}
    body{margin:0;overflow:hidden;background:#f5f0e8;font-family:'Jost',sans-serif}
    :root{--gold:#C9A84C;--gold2:#9a7535;--border:#e8e0d0;--muted:#8a7a60;--ch:#2a2010;--warm:#f5ede0;--sidebar:300px}

    /* ── Topbar ── */
    .bar{position:fixed;top:0;left:0;right:0;height:54px;background:white;
      border-bottom:1.5px solid var(--border);display:flex;align-items:center;
      padding:0 18px;gap:12px;z-index:200}
    .logo{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:600;
      font-style:italic;color:var(--ch);text-decoration:none}
    .logo em{color:var(--gold);font-style:italic}
    .bar-divider{width:1px;height:20px;background:var(--border)}
    .bar-title{font-size:11px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--muted)}
    .bar-right{margin-left:auto;display:flex;align-items:center;gap:8px}
    .save-lbl{font-size:11px;color:var(--muted)}
    .pill{padding:6px 14px;border-radius:99px;border:1.5px solid var(--border);background:white;
      font-family:'Jost',sans-serif;font-size:12px;font-weight:600;cursor:pointer;
      color:var(--ch);text-decoration:none;transition:.15s;white-space:nowrap;
      display:inline-flex;align-items:center;gap:5px}
    .pill:hover{border-color:var(--gold);color:var(--gold)}

    /* ── Layout ── */
    .layout{display:flex;height:calc(100vh - 54px);margin-top:54px}

    /* ── Canvas ── */
    .cnv{flex:1;position:relative;overflow:hidden;
      background:#f5f0e8;
      background-image:radial-gradient(circle,rgba(201,168,76,.16) 1px,transparent 1px);
      background-size:28px 28px}
    #layer{position:absolute;top:0;left:0;width:100%;height:100%;transform-origin:0 0}

    /* toolbar */
    .toolbar{position:absolute;top:14px;left:14px;display:flex;gap:6px;z-index:10}
    .tbtn{padding:7px 14px;border-radius:99px;background:white;border:1.5px solid var(--border);
      font-family:'Jost',sans-serif;font-size:11px;font-weight:600;cursor:pointer;
      color:var(--ch);box-shadow:0 2px 8px rgba(0,0,0,.07);transition:.15s}
    .tbtn:hover{border-color:var(--gold);color:var(--gold)}

    /* add-table bar */
    .addbar{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);
      background:white;border:1.5px solid var(--border);border-radius:99px;
      padding:5px 8px;display:flex;align-items:center;gap:4px;
      box-shadow:0 4px 24px rgba(0,0,0,.13);z-index:10}
    .addbtn{padding:7px 14px;border-radius:99px;border:none;background:transparent;
      font-family:'Jost',sans-serif;font-size:12px;font-weight:600;cursor:pointer;
      color:var(--ch);transition:.15s;display:flex;align-items:center;gap:6px}
    .addbtn:hover{background:#f5f0e8;color:var(--gold)}
    .adddiv{width:1px;height:24px;background:var(--border)}

    /* zoom */
    .zoom{position:absolute;bottom:20px;right:20px;display:flex;flex-direction:column;gap:6px;z-index:10}
    .zbtn{width:36px;height:36px;border-radius:10px;background:white;
      border:1.5px solid var(--border);font-size:18px;cursor:pointer;
      display:flex;align-items:center;justify-content:center;
      box-shadow:0 2px 8px rgba(0,0,0,.08);transition:.15s}
    .zbtn:hover{border-color:var(--gold);color:var(--gold)}

    /* ── Table nodes ── */
    .tnode{position:absolute;transform:translate(-50%,-50%);
      display:flex;flex-direction:column;align-items:center;
      cursor:grab;user-select:none}
    .tnode:active{cursor:grabbing}
    .tshape{display:flex;flex-direction:column;align-items:center;justify-content:center;
      border:2.5px solid;background:white;position:relative;
      box-shadow:0 3px 16px rgba(0,0,0,.1);transition:box-shadow .2s,transform .15s}
    .tshape:hover{transform:scale(1.02)}
    .tnode.sel .tshape{box-shadow:0 0 0 3px var(--gold),0 6px 24px rgba(0,0,0,.18)!important}
    .tshape.round{border-radius:50%}
    .tshape.oval{border-radius:50%}
    .tshape.rect{border-radius:10px}
    .tshape.long{border-radius:8px}
    .tshape.rectangular{border-radius:10px}
    .tname{font-size:11px;font-weight:700;color:var(--ch);pointer-events:none;text-align:center;padding:0 6px;line-height:1.2}
    .tcount{font-size:9px;margin-top:2px;pointer-events:none}
    .tguests{margin-top:5px;display:flex;flex-wrap:wrap;justify-content:center;gap:2px;max-width:220px;pointer-events:none}
    .tg{font-size:9px;border-radius:99px;padding:1px 6px;white-space:nowrap}
    .rot-h{position:absolute;top:-26px;left:50%;transform:translateX(-50%);
      width:24px;height:24px;border-radius:50%;background:var(--gold);color:white;
      font-size:13px;cursor:pointer;z-index:5;display:flex;align-items:center;
      justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,.2);border:none;
      transition:.15s;pointer-events:auto}
    .rot-h:hover{transform:translateX(-50%) scale(1.2)}
    .drop-target .tshape{
      outline:3px dashed var(--gold);outline-offset:4px;
      background:rgba(201,168,76,.06)!important}

    /* ── Sidebar ── */
    .sidebar{width:var(--sidebar);min-width:var(--sidebar);background:white;
      border-left:1.5px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
    .sbtabs{display:flex;border-bottom:1.5px solid var(--border)}
    .sbtab{flex:1;padding:12px 6px;font-size:12px;font-weight:600;text-align:center;
      cursor:pointer;border:none;background:none;font-family:'Jost',sans-serif;
      color:var(--muted);border-bottom:2.5px solid transparent;transition:.15s}
    .sbtab.on{color:var(--gold);border-bottom-color:var(--gold)}
    .sbpanel{flex:1;overflow-y:auto;padding:12px}
    .sbsearch{width:100%;padding:9px 14px;border:1.5px solid var(--border);border-radius:99px;
      font-family:'Jost',sans-serif;font-size:12px;outline:none;margin-bottom:10px;transition:.15s}
    .sbsearch:focus{border-color:var(--gold)}

    /* guest groups */
    .ggroup{background:#faf8f4;border:1.5px solid #e8e0d0;border-radius:12px;margin-bottom:8px;overflow:hidden}
    .ggroup-head{padding:8px 12px;background:#f5f0e8;border-bottom:1px solid #e8e0d0;
      display:flex;align-items:center;gap:8px}
    .gav{width:26px;height:26px;border-radius:50%;background:var(--gold);color:white;
      font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .ggroup-name{font-size:12px;font-weight:700;color:var(--ch);flex:1}
    .ggroup-ct{font-size:10px;color:var(--muted);white-space:nowrap}
    .ggroup-body{padding:6px 8px;display:flex;flex-direction:column;gap:3px}

    /* draggable chip */
    .pchip{background:white;border:1px solid var(--border);border-radius:8px;
      padding:7px 10px;display:flex;align-items:center;gap:8px;
      cursor:grab;transition:.15s;user-select:none}
    .pchip:hover{border-color:var(--gold);background:#fdf9f0;transform:translateX(2px)}
    .pchip.sub{padding-left:16px;background:#f9f7f3}
    .pchip.dragging{opacity:.35;transform:rotate(1.5deg) scale(.97)}
    .drag-lbl{font-size:9px;background:#f0ece4;border-radius:4px;padding:2px 6px;
      color:var(--muted);flex-shrink:0;pointer-events:none}

    /* table list */
    .tcard{background:white;border:1.5px solid var(--border);border-radius:12px;
      padding:12px;margin-bottom:8px;cursor:pointer;transition:.15s}
    .tcard:hover,.tcard.on{border-color:var(--gold);background:#fdf9f0}
    .tcbar{height:3px;background:#f0ece4;border-radius:2px;margin:6px 0 8px;overflow:hidden}
    .tcfill{height:100%;border-radius:2px;transition:.4s}
    .seated-row{display:flex;align-items:center;gap:6px;padding:4px 8px;
      border-radius:6px;margin-bottom:2px;transition:.15s}
    .seated-row:hover{background:#fff8f0}
    .seated-x{border:none;background:none;cursor:pointer;color:#c04040;
      font-size:12px;padding:0 2px;line-height:1;opacity:.5;transition:.15s;flex-shrink:0}
    .seated-x:hover{opacity:1}

    /* modal */
    .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:600;
      display:none;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px)}
    .modal-bg.open{display:flex}
    .modal{background:white;border-radius:20px;width:100%;max-width:440px;
      box-shadow:0 24px 80px rgba(0,0,0,.25);overflow:hidden;max-height:90vh;display:flex;flex-direction:column}
    .modal-head{padding:18px 22px 14px;border-bottom:1px solid var(--border);
      display:flex;align-items:center;gap:12px}
    .modal-title{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:600;flex:1}
    .modal-close{width:30px;height:30px;border-radius:50%;border:none;background:#f5f0e8;
      cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:.15s}
    .modal-close:hover{background:#e8e0d0}
    .modal-body{padding:18px 22px 22px;overflow-y:auto}
    .mlbl{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:7px;display:block}
    .minput{width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:10px;
      font-family:'Jost',sans-serif;font-size:14px;outline:none;transition:.15s;margin-bottom:14px}
    .minput:focus{border-color:var(--gold)}
    .popts{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
    .popt{padding:7px 14px;border-radius:99px;border:1.5px solid var(--border);background:white;
      font-family:'Jost',sans-serif;font-size:12px;font-weight:600;cursor:pointer;
      transition:.15s;color:var(--muted)}
    .popt.on{border-color:var(--gold);background:#fdf9f0;color:var(--ch)}
    .cap-row{display:flex;align-items:center;gap:12px;margin-bottom:14px}
    .capbtn{width:34px;height:34px;border-radius:50%;border:1.5px solid var(--border);
      background:white;font-size:20px;cursor:pointer;transition:.15s;
      display:flex;align-items:center;justify-content:center}
    .capbtn:hover{border-color:var(--gold);color:var(--gold)}
    .capnum{width:62px;text-align:center;padding:8px;border:1.5px solid var(--border);
      border-radius:10px;font-size:16px;font-weight:700;font-family:'Jost',sans-serif;outline:none}
    .swatches{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
    .sw{width:24px;height:24px;border-radius:50%;cursor:pointer;
      border:2.5px solid white;box-shadow:0 0 0 1.5px #ccc;transition:.15s}
    .sw.on{box-shadow:0 0 0 2.5px var(--gold)}
    .mfoot{display:flex;gap:8px;padding-top:4px}

    /* toast */
    .toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(14px);
      background:#2a2010;color:white;padding:11px 22px;border-radius:99px;
      font-size:13px;font-weight:500;opacity:0;transition:.3s;
      pointer-events:none;z-index:999;white-space:nowrap}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
    .toast.err{background:#c04040}

    /* empty */
    .empty{position:absolute;top:50%;left:calc(50% - var(--sidebar)/2 - 20px);
      transform:translate(-50%,-50%);text-align:center;pointer-events:none;opacity:.4}
    .empty p{font-size:13px;color:var(--muted);margin-top:10px}

    @media(max-width:700px){
      :root{--sidebar:100%}
      .sidebar{height:220px;border-left:none;border-top:1.5px solid var(--border);order:2}
      .layout{flex-direction:column}
      .cnv{order:1}
      body{overflow:auto}
    }
  </style>
</head>
<body>

<nav class="bar">
  <a href="dashboard.html" class="logo">Wedding<em>Ledger</em></a>
  <div class="bar-divider"></div>
  <span class="bar-title">Seating Chart</span>
  <div class="bar-right">
    <span class="save-lbl" id="saveLbl">All saved ✓</span>
    <a href="guests.html"    class="pill">Guests</a>
    <a href="dashboard.html" class="pill">← Dashboard</a>
  </div>
</nav>

<div class="layout">

  <!-- Canvas -->
  <div class="cnv" id="cnv">
    <div class="toolbar">
      <button class="tbtn" onclick="resetView()">⟳ Reset</button>
      <button class="tbtn" onclick="autoLayout()">✨ Auto Layout</button>
      <button class="tbtn" onclick="window.print()">🖨 Print</button>
    </div>

    <div id="layer"></div>

    <div class="empty" id="emptyHint">
      <svg width="56" height="56" viewBox="0 0 56 56" fill="none">
        <rect x="4" y="16" width="48" height="24" rx="6" stroke="#8a7a60" stroke-width="2"/>
        <circle cx="14" cy="28" r="2.5" fill="#8a7a60"/>
        <circle cx="28" cy="28" r="2.5" fill="#8a7a60"/>
        <circle cx="42" cy="28" r="2.5" fill="#8a7a60"/>
      </svg>
      <p>Add a table to get started</p>
    </div>

    <!-- Add table bar -->
    <div class="addbar">
      <button class="addbtn" onclick="addTable('round')">
        <svg width="15" height="15" viewBox="0 0 15 15"><circle cx="7.5" cy="7.5" r="6.5" fill="none" stroke="currentColor" stroke-width="1.5"/></svg>Round
      </button>
      <div class="adddiv"></div>
      <button class="addbtn" onclick="addTable('oval')">
        <svg width="15" height="15" viewBox="0 0 15 15"><ellipse cx="7.5" cy="7.5" rx="6.5" ry="4" fill="none" stroke="currentColor" stroke-width="1.5"/></svg>Oval
      </button>
      <div class="adddiv"></div>
      <button class="addbtn" onclick="addTable('rect')">
        <svg width="15" height="15" viewBox="0 0 15 15"><rect x="1" y="4" width="13" height="7" rx="2" fill="none" stroke="currentColor" stroke-width="1.5"/></svg>Rectangle
      </button>
      <div class="adddiv"></div>
      <button class="addbtn" onclick="addTable('long')">
        <svg width="15" height="15" viewBox="0 0 15 15"><rect x="0" y="5" width="15" height="5" rx="1.5" fill="none" stroke="currentColor" stroke-width="1.5"/></svg>Long
      </button>
    </div>

    <div class="zoom">
      <button class="zbtn" onclick="doZoom(.15)">+</button>
      <button class="zbtn" onclick="doZoom(-.15)" style="font-size:22px;font-weight:200">−</button>
    </div>
  </div>

  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sbtabs">
      <button class="sbtab on" onclick="showTab('guests',this)" id="tabG">Unassigned</button>
      <button class="sbtab"    onclick="showTab('tables',this)" id="tabT">Tables</button>
    </div>
    <div class="sbpanel" id="panG">
      <input class="sbsearch" id="search" placeholder="Filter guests…" oninput="renderSidebar()">
      <div id="glist"></div>
    </div>
    <div class="sbpanel" id="panT" style="display:none">
      <div id="tlist"></div>
    </div>
  </div>
</div>

<!-- Edit Modal -->
<div class="modal-bg" id="editModal" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-head">
      <span class="modal-title">Edit Table</span>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <label class="mlbl">Table Name</label>
      <input class="minput" id="mName">

      <label class="mlbl">Shape</label>
      <div class="popts" id="shapeOpts">
        <button class="popt on" data-v="round" onclick="pShape(this)">⭕ Round</button>
        <button class="popt"    data-v="oval"  onclick="pShape(this)">⬭ Oval</button>
        <button class="popt"    data-v="rect"  onclick="pShape(this)">▭ Rectangle</button>
        <button class="popt"    data-v="long"  onclick="pShape(this)">═ Long</button>
      </div>

      <label class="mlbl">Seats <small id="capHint" style="text-transform:none;letter-spacing:0;font-weight:400;font-size:10px"></small></label>
      <div class="cap-row">
        <button class="capbtn" onclick="adjCap(-1)">−</button>
        <input  class="capnum" type="number" id="mCap" min="1" max="60">
        <button class="capbtn" onclick="adjCap(1)">+</button>
      </div>

      <!-- Head chairs — long table only -->
      <div id="headRow" style="display:none;background:#faf8f4;border-radius:10px;padding:10px 12px;margin-bottom:14px;border:1px solid #e8e0d0">
        <label class="mlbl" style="margin-bottom:6px">Head chairs (ends of table)</label>
        <div class="popts" id="headOpts" style="margin-bottom:0">
          <button class="popt on" data-v="0" onclick="pHead(this)">None</button>
          <button class="popt"    data-v="1" onclick="pHead(this)">1 end</button>
          <button class="popt"    data-v="2" onclick="pHead(this)">Both ends</button>
        </div>
      </div>

      <!-- Rotation — rect/long only -->
      <div id="rotRow" style="display:none;margin-bottom:14px">
        <label class="mlbl">Rotation</label>
        <div class="popts" id="rotOpts">
          <button class="popt on" data-v="0"   onclick="pRot(this)">0°</button>
          <button class="popt"    data-v="45"  onclick="pRot(this)">45°</button>
          <button class="popt"    data-v="90"  onclick="pRot(this)">90°</button>
          <button class="popt"    data-v="135" onclick="pRot(this)">135°</button>
        </div>
      </div>

      <label class="mlbl">Colour</label>
      <div class="swatches" id="colorOpts"></div>

      <input type="hidden" id="mId">
      <div class="mfoot">
        <button class="btn-secondary" onclick="delTable()" style="color:#c04040;border-color:#fcc">Delete</button>
        <button class="btn-secondary" onclick="closeModal()" style="flex:1">Cancel</button>
        <button class="btn-primary"   onclick="saveModal()" style="flex:2">Save</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<script src="db.js"></script>
<script>
const COLORS=['#C9A84C','#9a7535','#2a7a2a','#2a4a7a','#7a2a5a','#c04040','#607080','#8a6020'];
let uid=localStorage.getItem('wl_uid');
let tok=localStorage.getItem('wl_token');
let guests=[],tables=[];
let sc=1,px=0,py=0,selId=null;
// drag state — using mouse events NOT HTML drag API for reliability
let drag={active:false,type:null,gid:null,famIdx:-1,tid:null,sx:0,sy:0,ox:0,oy:0};
let saveT=null;
let mShape='round',mRot=0,mHead=0,mColor=COLORS[0];

if(!uid||!tok){location.href='login.html';}
function $(id){return document.getElementById(id);}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function toast(msg,err){const t=$('toast');t.textContent=msg;t.className='toast'+(err?' err':'')+' show';setTimeout(()=>t.className='toast',3000);}
function setSave(s){$('saveLbl').textContent=s;}

// ── Init ─────────────────────────────────────────────────────────────────────
async function init(){
  try{
    const [g,t]=await Promise.all([
      DB.query(`guests?user_id=eq.${uid}&order=name.asc`,tok),
      DB.query(`seating_tables?user_id=eq.${uid}&order=created_at.asc`,tok)
    ]);
    guests=Array.isArray(g)?g:[];
    tables=Array.isArray(t)?t:[];
  }catch(e){console.error('init',e);guests=[];tables=[];}
  if(!tables.length) await makeDefaults();
  render(); renderSidebar(); renderTableList();
  setupCanvasEvents();
}

async function makeDefaults(){
  const defs=[
    {name:'Top Table',shape:'long', px:320,py:130,cap:12},
    {name:'Table 1', shape:'round',px:200,py:360,cap:8},
    {name:'Table 2', shape:'round',px:470,py:360,cap:8},
  ];
  for(const d of defs){
    const r=await DB.post('seating_tables',{user_id:uid,name:d.name,capacity:d.cap,
      shape:d.shape,position_x:d.px,position_y:d.py,color:'#C9A84C'},tok);
    if(r)tables.push(r);
  }
}

// ── Helpers ──────────────────────────────────────────────────────────────────
function getFam(g){
  if(!g.family_members)return[];
  try{const f=typeof g.family_members==='string'?JSON.parse(g.family_members):g.family_members;
    return Array.isArray(f)?f:[];}catch(e){return[];}
}

function tSize(t){
  const cap=parseInt(t.capacity)||8;
  const sh=(t.shape||'round').toLowerCase();
  if(sh==='round'){const s=Math.max(88,Math.min(150,70+cap*5));return{w:s,h:s};}
  if(sh==='oval'){const w=Math.max(120,Math.min(200,90+cap*8));return{w,h:Math.round(w*.58)};}
  if(sh==='long'||sh==='long table'){const w=Math.max(160,Math.min(320,100+cap*15));return{w,h:68};}
  // rect / rectangular
  const w=Math.max(110,Math.min(200,82+cap*6));return{w,h:Math.round(w*.62)};
}

function countAt(tid){
  let n=0;
  guests.forEach(g=>{
    if(g.table_id===tid)n++;
    getFam(g).forEach(m=>{if(m.table_id===tid)n++;});
  });
  return n;
}

function seatedAt(tid){
  const rows=[];
  guests.forEach(g=>{
    if(g.table_id===tid)rows.push({name:g.name,type:'guest',gid:g.id,fi:-1});
    getFam(g).forEach((m,i)=>{
      if(m.table_id===tid){
        const n=((m.first||'')+' '+(m.last||'')).trim()||'Family member';
        rows.push({name:n,type:m.type||'family',gid:g.id,fi:i});
      }
    });
  });
  return rows;
}

// ── Render canvas ─────────────────────────────────────────────────────────────
function applyTx(){$('layer').style.transform=`translate(${px}px,${py}px) scale(${sc})`;}

function render(){
  const layer=$('layer');
  layer.innerHTML='';
  $('emptyHint').style.display=tables.length?'none':'block';

  tables.forEach(t=>{
    const sh=(t.shape||'round').toLowerCase().replace(' ','');
    const shCls=['round','oval','rect','rectangular','long'].includes(sh)?sh:'round';
    const {w,h}=tSize(t);
    const rot=parseInt(t.rotation)||0;
    const col=t.color||COLORS[0];
    const cnt=countAt(t.id);
    const cap=parseInt(t.capacity)||8;
    const full=cnt>=cap;
    const isSel=selId===t.id;
    const all=seatedAt(t.id);

    const node=document.createElement('div');
    node.className='tnode'+(isSel?' sel':'');
    node.id='tn-'+t.id;
    node.style.left=t.position_x+'px';
    node.style.top =t.position_y+'px';

    const canRot=shCls!=='round'&&shCls!=='oval';
    const rotH=isSel&&canRot
      ?`<button class="rot-h" onmousedown="event.stopPropagation()" onclick="qRot('${t.id}')" title="Rotate 90°">↻</button>`:'';

    const chips=all.slice(0,8).map(p=>
      `<span class="tg" style="background:${col}18;border:1px solid ${col}44;color:${col}">${esc(p.name.split(' ')[0])}</span>`
    ).join('')+(all.length>8?`<span class="tg" style="color:var(--muted)">+${all.length-8}</span>`:'');

    node.innerHTML=`
      ${rotH}
      <div class="tshape ${shCls}" style="width:${w}px;height:${h}px;border-color:${col};transform:rotate(${rot}deg)"
        ondblclick="openModal('${t.id}')">
        <div class="tname">${esc(t.name)}</div>
        <div class="tcount" style="color:${full?'#c04040':'var(--muted)'};">${cnt}/${cap}</div>
      </div>
      ${all.length?`<div class="tguests">${chips}</div>`:''}`;

    // TABLE DRAG: mousedown on shape drags the whole table
    const shape=node.querySelector('.tshape');
    shape.addEventListener('mousedown',e=>{
      if(e.button!==0)return;
      e.preventDefault();e.stopPropagation();
      drag={active:true,type:'table',tid:t.id,sx:e.clientX,sy:e.clientY,
        ox:t.position_x,oy:t.position_y};
      selId=t.id; render(); renderTableList();
    });

    layer.appendChild(node);
  });
  applyTx();
}

// ── Canvas mouse events ──────────────────────────────────────────────────────
function setupCanvasEvents(){
  const cnv=$('cnv');
  // Global mousemove & mouseup handle both table drag and canvas pan
  document.addEventListener('mousemove',e=>{
    if(!drag.active)return;
    if(drag.type==='table'){
      const t=tables.find(x=>x.id===drag.tid);if(!t)return;
      t.position_x=Math.max(50,drag.ox+(e.clientX-drag.sx)/sc);
      t.position_y=Math.max(50,drag.oy+(e.clientY-drag.sy)/sc);
      const node=$('tn-'+drag.tid);
      if(node){node.style.left=t.position_x+'px';node.style.top=t.position_y+'px';}
    } else if(drag.type==='pan'){
      px=drag.ox+(e.clientX-drag.sx);
      py=drag.oy+(e.clientY-drag.sy);
      applyTx();
    }
  });
  document.addEventListener('mouseup',e=>{
    if(!drag.active)return;
    if(drag.type==='table'){
      const t=tables.find(x=>x.id===drag.tid);
      if(t)schedSave(t,{position_x:t.position_x,position_y:t.position_y});
    }
    drag.active=false;
  });
  // Pan: left-click on empty canvas
  cnv.addEventListener('mousedown',e=>{
    if(e.button!==0)return;
    if(e.target!==cnv&&e.target!==$('layer'))return;
    selId=null; render();
    drag={active:true,type:'pan',sx:e.clientX,sy:e.clientY,ox:px,oy:py};
    e.preventDefault();
  });
  // Zoom via wheel
  cnv.addEventListener('wheel',e=>{e.preventDefault();doZoom(e.deltaY<0?.12:-.12);},{passive:false});
}

function doZoom(d){sc=Math.max(.3,Math.min(2.5,sc+d));applyTx();}
function resetView(){sc=1;px=0;py=0;applyTx();}

function qRot(id){
  const t=tables.find(x=>x.id===id);if(!t)return;
  t.rotation=((parseInt(t.rotation)||0)+90)%360;
  render();schedSave(t,{rotation:t.rotation});
}

// ── Sidebar: Unassigned ──────────────────────────────────────────────────────
function renderSidebar(){
  const q=($('search')?.value||'').toLowerCase();

  // Flatten everyone into people with tableId
  const people=[];
  guests.forEach(g=>{
    const fam=getFam(g);
    people.push({gid:g.id,fi:-1,name:g.name,type:'guest',tid:g.table_id||null});
    fam.forEach((m,i)=>{
      const n=((m.first||'')+' '+(m.last||'')).trim()||'Family member';
      // A family member is seated if they have their OWN table_id OR if main guest is seated
      const famTid=m.table_id||null;
      people.push({gid:g.id,fi:i,name:n,type:m.type||'family',tid:famTid});
    });
  });

  const unassigned=people.filter(p=>!p.tid&&(q?p.name.toLowerCase().includes(q):true));

  const el=$('glist');
  if(!unassigned.length){
    const total=people.filter(p=>!p.tid).length;
    el.innerHTML=`<div style="text-align:center;padding:24px;color:var(--muted);font-size:13px">
      ${total===0?'🎉 All guests seated!':'No matching guests'}</div>`;
    return;
  }

  // Group by main guest
  const byGid={};
  unassigned.forEach(p=>{if(!byGid[p.gid])byGid[p.gid]=[];byGid[p.gid].push(p);});

  let html='';
  Object.entries(byGid).forEach(([gid,ppl])=>{
    const mg=guests.find(x=>x.id===gid);if(!mg)return;
    const ini=mg.name.charAt(0).toUpperCase();
    html+=`<div class="ggroup">
      <div class="ggroup-head">
        <div class="gav">${ini}</div>
        <span class="ggroup-name">${esc(mg.name)}</span>
        <span class="ggroup-ct">${ppl.length} unassigned</span>
      </div>
      <div class="ggroup-body">
        ${ppl.map(p=>{
          const isMain=p.fi===-1;
          return`<div class="pchip${isMain?'':' sub'}"
            data-gid="${p.gid}" data-fi="${p.fi}"
            onmousedown="startGuestDrag(event,this)">
            <div style="flex:1;min-width:0">
              <div style="font-weight:${isMain?700:500};font-size:12px;
                white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(p.name)}</div>
              <div style="font-size:10px;color:var(--muted)">${isMain?'guest':p.type}</div>
            </div>
            <span class="drag-lbl">drag</span>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  });
  el.innerHTML=html||`<div style="text-align:center;padding:24px;color:var(--muted);font-size:13px">No results</div>`;
}

// ── Guest drag via mouse (not HTML5 drag API — much more reliable) ────────────
let gDragEl=null, gDragGhost=null;

function startGuestDrag(e,chip){
  if(e.button!==0)return;
  e.preventDefault();e.stopPropagation();
  const gid=chip.dataset.gid;
  const fi=parseInt(chip.dataset.fi);

  // Create ghost
  gDragGhost=document.createElement('div');
  gDragGhost.style.cssText=`position:fixed;pointer-events:none;z-index:9999;
    background:white;border:1.5px solid var(--gold);border-radius:8px;padding:7px 12px;
    font-family:'Jost',sans-serif;font-size:12px;font-weight:600;color:var(--ch);
    box-shadow:0 8px 32px rgba(0,0,0,.2);opacity:.92;white-space:nowrap;`;
  const txt=chip.querySelector('div div')?.textContent||'Guest';
  gDragGhost.textContent=txt;
  document.body.appendChild(gDragGhost);
  moveGhost(e);

  chip.classList.add('dragging');
  drag={active:true,type:'guest',gid,fi,chip};

  const mm=ev=>{
    moveGhost(ev);
    // Highlight table under cursor
    document.querySelectorAll('.tnode').forEach(n=>n.classList.remove('drop-target'));
    const layerRect=$('layer').getBoundingClientRect();
    const lx=(ev.clientX-layerRect.left)/sc/sc; // approximate
    const under=document.elementFromPoint(ev.clientX,ev.clientY);
    const tnode=under?.closest('.tnode');
    if(tnode)tnode.classList.add('drop-target');
  };
  const mu=async ev=>{
    document.removeEventListener('mousemove',mm);
    document.removeEventListener('mouseup',mu);
    gDragGhost?.remove();gDragGhost=null;
    chip.classList.remove('dragging');
    document.querySelectorAll('.tnode').forEach(n=>n.classList.remove('drop-target'));
    drag.active=false;

    const under=document.elementFromPoint(ev.clientX,ev.clientY);
    const tnode=under?.closest('.tnode');
    if(!tnode){return;} // dropped on canvas — nothing
    const tid=tnode.id.replace('tn-','');
    await seatPerson(gid,fi,tid);
  };
  document.addEventListener('mousemove',mm);
  document.addEventListener('mouseup',mu);
}

function moveGhost(e){
  if(!gDragGhost)return;
  gDragGhost.style.left=(e.clientX+14)+'px';
  gDragGhost.style.top =(e.clientY-16)+'px';
}

async function seatPerson(gid,fi,tid){
  const tbl=tables.find(x=>x.id===tid);
  const g=guests.find(x=>x.id===gid);
  if(!tbl||!g)return;

  const current=countAt(tid);
  if(current>=tbl.capacity){toast('Table is full!',true);return;}

  if(fi===-1){
    // Seat main guest
    g.table_id=tid;
    const ok=await DB.patch(`guests?id=eq.${gid}`,{table_id:tid},tok);
    if(!ok&&ok!==null)console.error('patch failed');
  } else {
    // Seat family member individually
    const fam=getFam(g);
    if(!fam[fi]){return;}
    fam[fi].table_id=tid;
    g.family_members=fam;
    // Store updated family_members
    await DB.patch(`guests?id=eq.${gid}`,{family_members:fam},tok);
  }
  render(); renderSidebar(); renderTableList();
  toast('Seated ✓');
}

async function unseat(gid,fi){
  const g=guests.find(x=>x.id===gid);if(!g)return;
  if(fi===-1){
    g.table_id=null;
    await DB.patch(`guests?id=eq.${gid}`,{table_id:null},tok);
  } else {
    const fam=getFam(g);
    if(fam[fi]){delete fam[fi].table_id;}
    g.family_members=fam;
    await DB.patch(`guests?id=eq.${gid}`,{family_members:fam},tok);
  }
  render(); renderSidebar(); renderTableList();
  toast('Removed');
}

// ── Sidebar: Tables ──────────────────────────────────────────────────────────
function renderTableList(){
  const el=$('tlist');
  if(!tables.length){
    el.innerHTML=`<div style="text-align:center;padding:24px;color:var(--muted);font-size:13px">No tables yet</div>`;
    return;
  }
  el.innerHTML=tables.map(t=>{
    const seated=seatedAt(t.id);
    const cap=parseInt(t.capacity)||8;
    const pct=Math.min(100,Math.round(seated.length/cap*100));
    const full=seated.length>=cap;
    return`<div class="tcard${selId===t.id?' on':''}" onclick="focusTable('${t.id}')">
      <div style="display:flex;align-items:center;gap:8px">
        <div style="width:10px;height:10px;border-radius:50%;background:${t.color};flex-shrink:0"></div>
        <span style="font-weight:700;font-size:13px;flex:1">${esc(t.name)}</span>
        <span style="font-size:11px;color:${full?'#c04040':'var(--muted)'}">${seated.length}/${cap}</span>
        <button onclick="event.stopPropagation();openModal('${t.id}')"
          style="border:none;background:none;cursor:pointer;padding:2px 6px;color:var(--muted);font-size:13px">✏️</button>
      </div>
      <div class="tcbar"><div class="tcfill" style="width:${pct}%;background:${t.color}"></div></div>
      ${seated.length
        ?seated.map(p=>`<div class="seated-row">
            <div style="width:6px;height:6px;border-radius:50%;background:${t.color};flex-shrink:0"></div>
            <span style="font-size:12px;flex:1;font-weight:${p.type==='guest'?600:400}">${esc(p.name)}</span>
            <span style="font-size:10px;color:var(--muted)">${p.type}</span>
            <button class="seated-x" onclick="event.stopPropagation();unseat('${p.gid}',${p.fi})" title="Remove">✕</button>
          </div>`).join('')
        :`<div style="font-size:11px;color:var(--muted);font-style:italic;padding:2px 4px">Empty — drag guests here</div>`}
    </div>`;
  }).join('');
}

function focusTable(id){
  selId=id; render(); renderTableList();
  const t=tables.find(x=>x.id===id);
  if(t){
    const cnv=$('cnv');
    px=cnv.clientWidth/2-t.position_x*sc;
    py=cnv.clientHeight/2-t.position_y*sc;
    applyTx();
  }
}

function showTab(tab,btn){
  document.querySelectorAll('.sbtab').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  $('panG').style.display=tab==='guests'?'block':'none';
  $('panT').style.display=tab==='tables'?'block':'none';
}

// ── Add table ────────────────────────────────────────────────────────────────
async function addTable(shape){
  const cnv=$('cnv');
  const tpx=Math.max(80,(cnv.clientWidth/2-px)/sc+(Math.random()-.5)*150);
  const tpy=Math.max(80,(cnv.clientHeight/2-py)/sc+(Math.random()-.5)*150);
  const cap=shape==='long'?12:8;
  const n=tables.length+1;
  const names={round:'Table',oval:'Oval Table',rect:'Table',long:'Long Table'};
  const r=await DB.post('seating_tables',{
    user_id:uid,name:names[shape]+' '+n,capacity:cap,shape,
    position_x:Math.round(tpx),position_y:Math.round(tpy),color:'#C9A84C'
  },tok);
  if(r){tables.push(r);render();renderTableList();toast('Table added');}
}

// ── Modal ─────────────────────────────────────────────────────────────────────
function buildSwatches(){
  $('colorOpts').innerHTML=COLORS.map(c=>
    `<div class="sw${c===mColor?' on':''}" style="background:${c}"
      onclick="pColor('${c}',this)"></div>`
  ).join('');
}

function openModal(id){
  const t=tables.find(x=>x.id===id);if(!t)return;
  $('mName').value=t.name;$('mCap').value=t.capacity;$('mId').value=id;
  mShape=(t.shape||'round').toLowerCase().replace(' ','');
  if(mShape==='rectangular')mShape='rect';
  mRot=parseInt(t.rotation)||0;
  mHead=parseInt(t.head_chairs)||0;
  mColor=t.color||COLORS[0];
  document.querySelectorAll('#shapeOpts .popt').forEach(b=>b.classList.toggle('on',b.dataset.v===mShape));
  document.querySelectorAll('#rotOpts   .popt').forEach(b=>b.classList.toggle('on',parseInt(b.dataset.v)===mRot));
  document.querySelectorAll('#headOpts  .popt').forEach(b=>b.classList.toggle('on',parseInt(b.dataset.v)===mHead));
  buildSwatches(); updateModalUI();
  $('editModal').classList.add('open');
}

function updateModalUI(){
  const isLong=mShape==='long';
  const isCirc=mShape==='round'||mShape==='oval';
  $('headRow').style.display=isLong?'block':'none';
  $('rotRow').style.display=isCirc?'none':'block';
  const hints={round:'around table',oval:'around table',rect:'total seats',long:'along sides'};
  $('capHint').textContent='('+hints[mShape]+')';
}

function closeModal(){$('editModal').classList.remove('open');}
function pShape(btn){document.querySelectorAll('#shapeOpts .popt').forEach(b=>b.classList.remove('on'));btn.classList.add('on');mShape=btn.dataset.v;updateModalUI();}
function pRot(btn){document.querySelectorAll('#rotOpts   .popt').forEach(b=>b.classList.remove('on'));btn.classList.add('on');mRot=parseInt(btn.dataset.v);}
function pHead(btn){document.querySelectorAll('#headOpts  .popt').forEach(b=>b.classList.remove('on'));btn.classList.add('on');mHead=parseInt(btn.dataset.v);}
function pColor(c,el){mColor=c;document.querySelectorAll('#colorOpts .sw').forEach(s=>s.classList.remove('on'));el.classList.add('on');}
function adjCap(d){const el=$('mCap');el.value=Math.max(1,Math.min(60,(parseInt(el.value)||8)+d));}

async function saveModal(){
  const id=$('mId').value;
  const data={name:$('mName').value.trim(),capacity:parseInt($('mCap').value),
    shape:mShape,color:mColor,rotation:mRot,head_chairs:mHead};
  try{await DB.patch(`seating_tables?id=eq.${id}`,data,tok);}
  catch(e){
    // Retry without new columns if they don't exist
    await DB.patch(`seating_tables?id=eq.${id}`,
      {name:data.name,capacity:data.capacity,shape:data.shape,color:data.color},tok);
  }
  const t=tables.find(x=>x.id===id);if(t)Object.assign(t,data);
  closeModal();render();renderTableList();toast('Saved ✓');
}

async function delTable(){
  const id=$('mId').value;
  if(!confirm('Delete table? Guests will be unassigned.'))return;
  for(const g of guests.filter(x=>x.table_id===id)){
    g.table_id=null;
    await DB.patch(`guests?id=eq.${g.id}`,{table_id:null},tok);
  }
  // Also clear family members seated there
  for(const g of guests){
    const fam=getFam(g);let changed=false;
    fam.forEach(m=>{if(m.table_id===id){delete m.table_id;changed=true;}});
    if(changed){g.family_members=fam;await DB.patch(`guests?id=eq.${g.id}`,{family_members:fam},tok);}
  }
  await DB.del(`seating_tables?id=eq.${id}`,tok);
  tables=tables.filter(t=>t.id!==id);
  closeModal();render();renderSidebar();renderTableList();toast('Deleted');
}

// ── Auto layout ──────────────────────────────────────────────────────────────
function autoLayout(){
  const cnv=$('cnv');const W=cnv.clientWidth-160,H=cnv.clientHeight-160;
  const cols=Math.ceil(Math.sqrt(tables.length));
  tables.forEach((t,i)=>{
    t.position_x=140+(i%cols)*Math.max(180,W/cols);
    t.position_y=140+Math.floor(i/cols)*Math.max(200,H/Math.ceil(tables.length/cols));
    schedSave(t,{position_x:t.position_x,position_y:t.position_y});
  });
  render();toast('Layout applied ✨');
}

function schedSave(t,fields){
  setSave('Saving…');clearTimeout(saveT);
  saveT=setTimeout(async()=>{
    await DB.patch(`seating_tables?id=eq.${t.id}`,fields,tok);
    setSave('All saved ✓');
  },700);
}

init();
</script>
